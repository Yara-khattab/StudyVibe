<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Room</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/all.css">
    <link rel="stylesheet" href="css/privateroom.css">
</head>
<body>
    <section class="private-room">
        <div class="study-room">
            <div class="room-content">
                <div class="left-panel">
                <div class="hello-join">
                    <div>
                        <h2>Hello <span id="username">Maya!</span></h2>
                    </div>
                    <div class="avatar">
                        <i class="fa-solid fa-circle-user"></i>
                    </div>
                </div>
                <p class="underline"></p>
                <div class="focus-box">
                    <h3>Today’s Focus</h3>
                    <label class="focus-item">
                        <input type="checkbox">
                        <span class="checkmark"></span>OOP Task
                    </label>
                     <label class="focus-item">
                        <input type="checkbox">
                        <span class="checkmark"></span>Data Structures
                    </label>
                    <label class="focus-item">
                        <input type="checkbox">
                        <span class="checkmark"></span>OS Lab</label>
                    <label class="focus-item">
                        <input type="checkbox">
                        <span class="checkmark"></span>Physics</label>
                </div>
            </div>
            <div class="right-card">
                <h3>Welcome to your Study Space</h3>
                <div class="study-preview"></div>
                <div class="partner">
                    <div class="partner-avatar" style="background:#eab308;"><i class="fa-solid fa-user"></i></div>
                    <div class="leave-room">
                        <div>
                        <h4 id="partner-name">Maya Yaser</h4>
                        <p>Keep Going !!!</p>
                        </div>
                        <button class="leave-btn">Leave Room</button>
                    </div>
                </div>
                <div class="meta">
                    <span class="text-study">STUDYING</span>
                    <span>Break in: <span id="break-time">15m</span></span>
                </div>
                <div class="progress"><div class="progress-fill"></div></div>
                <div class="timer" id="session-timer">01:45:00</div>
            </div>
            </div>
            
        </div>
    </section>
    
</body>
</html>
