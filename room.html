<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVibe - Live Room</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="rk-body">

<div class="rk-container">
    <div class="rk-chat-box">
        <div class="rk-chat-header">
            <h2>Live Chat</h2>
            <span class="rk-status">3 Active</span>
        </div>
        <div class="rk-line"></div>
        <div class="rk-chat-messages">
            <div class="rk-msg-row rk-active-msg">
                <div class="rk-indicator"></div>
                <p class="rk-msg">Roqia: Guys, almost break time! Let's finish this task.</p>
            </div>
            <div class="rk-msg-row">
                <div class="rk-indicator"></div>
                <p class="rk-msg">Maya: Agreed! I’m just fixing the last few Auto Layouts.</p>
            </div>
            <div class="rk-msg-row">
                <div class="rk-indicator"></div>
                <p class="rk-msg">Salma: This focus session is exactly what I needed.</p>
            </div>
        </div>
        <input type="text" placeholder="Type a message..." class="rk-input">
    </div>

    <div class="rk-side-card">
        <div class="rk-card-top">
            <h3>Welcome to your Study Space</h3>
            <img src="images/room.png" class="rk-img" alt="Study Room">
            <div class="rk-members-label">Members <span class="rk-active-now">Active Now</span></div>
            <div class="rk-avatars">
                <div class="rk-avatar" style="background:#22c55e;"><i class="fa-solid fa-user"></i><span class="rk-plus">+</span></div>
                <div class="rk-avatar" style="background:#3b82f6;"><i class="fa-solid fa-user"></i></div>
                <div class="rk-avatar" style="background:#f97316;"><i class="fa-solid fa-user"></i></div>
                <div class="rk-avatar" style="background:#eab308;"><i class="fa-solid fa-user"></i><span class="rk-plus">+</span></div>
            </div>
        </div>
        <div class="rk-card-bottom">
            <div class="rk-session-row">
                <button class="rk-join-btn">JOIN SESSION</button>
                <span class="rk-break">Break in: 15m</span>
            </div>
            <div class="rk-progress-bg"><div class="rk-progress-fill"></div></div>
            <div class="rk-timer"><i class="fa-solid fa-clock"></i><span>01:45:00</span></div>
            <p class="rk-others">10+ others studying</p>
        </div>
    </div>
</div>

<div class="rk-bottom-bar">
    <div class="rk-icons-group">
        <i class="fa-solid fa-arrow-up"></i>
        <i class="fa-solid fa-video"></i>
        <i class="fa-solid fa-microphone"></i>
    </div>
    <button class="rk-leave-btn">Leave Room</button>
</div>

</body>
</html>
