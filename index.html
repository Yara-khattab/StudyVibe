     <link rel="stylesheet" href="CSS/style.css">

<main class="home-page">
  <nav class="nav-bar navbar navbar-expand-md navbar-dark"> 
    <div class="container-fluid d-flex justify-content-between align-items-center">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#studyVibeMenu">

        <div class="collapse navbar-collapse" id="studyVibeMenu">

            <div class="nav-buttons ms-auto mt-3 mt-md-0">
