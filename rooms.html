<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>room page</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/rooms.css">
    <link rel="stylesheet" href="CSS/all.css">

</head>

<body>
   <main class="rooms-page">
   
    <div class="mobile-nav-toggle d-md-none" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </div>

    <section class="rooms-sidebar" id="sidebar">
   
        <div class="close-sidebar d-md-none" onclick="toggleSidebar()">
            <i class="fas fa-times"></i>
        </div>
        
        <div class="logo-sidebar">
             <i class="fa-solid fa-book-open"></i> StudyVibe
        </div>

        <div class="rooms-sidebar-menu">
            <ul>
                <li><button class="btn" onclick="location.href='index.html'"><i class="fas fa-home"></i> Home</button></li>
                <li><button class="btn" onclick="location.href='profile.html'"><i class="fas fa-user"></i> My Profile</button></li>
                <li><button class="btn" onclick="location.href='rooms.html'"><i class="fas fa-users"></i> Rooms</button></li>
                <li><button class="btn logout-btn" onclick="location.href='login.html'"><i class="fas fa-sign-out-alt"></i> Log out</button></li>
            </ul>
        </div>
    </section>

    <section class="rooms-body">
        <div class="welcome-section">
            <h1>Hello, Maya! Are you ready?</h1>
        </div>

        <div class="actions-container">
          
            <div class="room-card">
                <button class="btn action-btn" onclick="location.href='createRoom.html'">
                    <i class="fas fa-plus"></i> Create Room
                </button>
                <p>Start your own private study space. Invite friends, share documents, and chat in real-time.</p>
            </div>

       
            <div class="room-card">
                <button class="btn action-btn" onclick="location.href='join.html'">
                    <i class="fas fa-sign-in-alt"></i> Join Room
                </button>
                <p>Join public study rooms and find your flow with others. Stay motivated and accountable while hitting your goals together.</p>
            </div>
        </div>

        
    </section>
</main>


<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }
</script>
    
</body>

</html>
