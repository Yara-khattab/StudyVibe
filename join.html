<!DOCTYPE html>
<html lang="en">
<head>

            </div>

                <div class="room-grid">
                    <div class="room-card">

                         <div>

                        </div>

                    </div>
                    <div class="room-card">
                        <h4>Physics 2</h4>
                         <div>
                            <i class="fa-solid fa-users"></i>
                        </div>
                        <button>Join Now</button>
                    </div>
                    <div class="room-card">
                        <h4>Java OOP</h4>
                        <div>
                            <i class="fa-solid fa-users"></i>
                        </div>
                        <button>Join Now</button>
                    </div>

            </div>
        </div>
    </section>
